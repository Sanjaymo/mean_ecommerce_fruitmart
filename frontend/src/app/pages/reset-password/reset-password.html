<section id="reset-page" class="fm-page-shell fm-auth-shell">
  <style>
    /* Page-scoped: Reset Password — inner container, label above inputs, password wrap layout */
    #reset-page .fm-card.fm-auth-reset-card {
      padding-left: 1rem;
      padding-right: 1rem;
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #e6e9ef;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    #reset-page form > div {
      background: #fbfdff;
      border-radius: 12px;
      padding: 14px;
      box-sizing: border-box;
      border: 1px solid rgba(230,233,239,0.6);
      width: 100%;
    }

    #reset-page label { display:block; margin-bottom:8px; color:#374151; font-weight:600; }

    /* Password wrap: input expands, toggle button sits to the right */
    #reset-page .fm-password-wrap { display:flex; gap:8px; align-items:center; }
    #reset-page .fm-password-wrap .fm-input { flex:1; margin:0; height:44px; padding:8px 12px; border-radius:8px; border:1px solid #e6e9ef; box-sizing:border-box; }
    #reset-page .fm-password-wrap .fm-icon-button { width:40px; height:40px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; border:none; background:transparent; }

    #reset-page .fm-button-primary { width:100%; max-width:none; display:block; margin:12px 0 0 0; height:44px; border-radius:8px; background:linear-gradient(180deg,#1e90ff,#0066d6); color:#fff; font-weight:600; border:none; }

    @media (max-width:420px){ #reset-page .fm-card.fm-auth-reset-card{padding-left:.75rem;padding-right:.75rem} #reset-page form>div{padding:10px} }
  </style>
  <div class="mx-auto w-full max-w-3xl px-4 py-10 sm:px-6 lg:py-16">
    <div class="fm-card fm-auth-reset-card rounded-[32px] p-7 sm:p-10">
      <div class="text-center">
        <img ngSrc="/logo.png?v=3" width="48" height="48" alt="FruitMart logo" class="mx-auto h-12 w-12 rounded-2xl object-cover" />
        <h1 class="mt-4 text-3xl font-semibold text-white">Reset Password</h1>
        <p class="mt-2 text-sm text-slate-300">Set a new secure password for your account.</p>
      </div>

      @if (error()) {
        <div class="mt-5 rounded-2xl border border-rose-400/20 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-200">New Password</label>
          <div class="fm-password-wrap">
            <input [type]="showPassword() ? 'text' : 'password'" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" placeholder="Minimum 8 characters" class="fm-input fm-auth-input" required />
            <button type="button" (click)="showPassword.update(v => !v)" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'" class="fm-icon-button fm-auth-toggle">
              @if (showPassword()) {
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/><path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0013.412 13.4"/><path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.094A10.955 10.955 0 0112 4.91c5.053 0 9.27 3.11 10.5 7.09a10.96 10.96 0 01-4.043 5.135M6.228 6.228A10.945 10.945 0 001.5 12c1.23 3.98 5.447 7.09 10.5 7.09 1.61 0 3.141-.316 4.535-.89"/></svg>
              } @else {
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.46 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.54 7-1.272 4.057-5.062 7-9.54 7-4.478 0-8.268-2.943-9.54-7z"/><circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              }
            </button>
          </div>
          <p class="mt-1 text-xs text-slate-400">Use at least 8 characters with letters and numbers.</p>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-200">Confirm Password</label>
          <div class="fm-password-wrap">
            <input [type]="showConfirmPassword() ? 'text' : 'password'" [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" class="fm-input fm-auth-input" required />
            <button type="button" (click)="showConfirmPassword.update(v => !v)" [attr.aria-label]="showConfirmPassword() ? 'Hide confirm password' : 'Show confirm password'" class="fm-icon-button fm-auth-toggle">
              @if (showConfirmPassword()) {
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/><path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0013.412 13.4"/><path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.094A10.955 10.955 0 0112 4.91c5.053 0 9.27 3.11 10.5 7.09a10.96 10.96 0 01-4.043 5.135M6.228 6.228A10.945 10.945 0 001.5 12c1.23 3.98 5.447 7.09 10.5 7.09 1.61 0 3.141-.316 4.535-.89"/></svg>
              } @else {
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.46 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.54 7-1.272 4.057-5.062 7-9.54 7-4.478 0-8.268-2.943-9.54-7z"/><circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="loading()" class="fm-button-primary w-full rounded-full py-3.5 text-base disabled:cursor-not-allowed disabled:opacity-60">{{ loading() ? 'Resetting...' : 'Reset Password' }}</button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-300"><a routerLink="/login" class="font-semibold text-indigo-300 transition hover:text-indigo-200">Back to Login</a></p>
    </div>
  </div>
</section>
