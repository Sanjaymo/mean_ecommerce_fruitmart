<section id="forgot-page" class="fm-page-shell fm-auth-shell">
  <style>
    /* Page-scoped: remove extra side gaps and place label above input inside a single rounded row */
    #forgot-page .fm-card {
      padding-left: 1rem;
      padding-right: 1rem;
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #e6e9ef;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    /* Wrap the label+input in a subtle rounded container that spans the card width */
    #forgot-page form > div {
      background: #fbfdff;
      border-radius: 12px;
      padding: 14px;
      box-sizing: border-box;
      border: 1px solid rgba(230,233,239,0.6);
      display: block;
      width: 100%;
    }

    /* Label sits above the input, aligned with the input edges */
    #forgot-page label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 600;
    }

    /* Input fills the inner container horizontally; no extra left/right margins */
    #forgot-page .fm-auth-narrow-input,
    #forgot-page .fm-input {
      width: 100%;
      max-width: none;
      display: block;
      margin: 0;
      box-sizing: border-box;
      height: 44px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #e6e9ef;
      background: #ffffff;
      color: #0f172a;
      box-shadow: none;
    }

    /* Button matches the inner container width and sits flush under the input */
    #forgot-page .fm-button-primary {
      width: 100%;
      max-width: none;
      display: block;
      margin: 12px 0 0 0;
      height: 44px;
      border-radius: 8px;
      background: linear-gradient(180deg, #1e90ff, #0066d6);
      color: #ffffff;
      font-weight: 600;
      border: none;
      box-shadow: none;
    }

    @media (max-width: 420px) {
      #forgot-page .fm-card { padding-left: 0.75rem; padding-right: 0.75rem; }
      #forgot-page form > div { padding: 10px; }
    }
  </style>
  <div class="mx-auto w-full max-w-2xl px-4 py-10 sm:px-6 lg:py-16">
    <div class="fm-card rounded-[32px] p-6 sm:p-8">
      <div class="text-center">
        <img ngSrc="/logo.png?v=3" width="48" height="48" alt="FruitMart logo" class="mx-auto h-12 w-12 rounded-2xl object-cover" />
        <h1 class="mt-4 text-3xl font-semibold text-white">Forgot Password</h1>
        <p class="mt-2 text-sm text-slate-300">Enter your email to receive a one-time verification code.</p>
      </div>

      @if (error()) {
        <div class="mt-5 rounded-2xl border border-rose-400/20 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">{{ error() }}</div>
      }

      @if (success()) {
        <div class="mt-5 rounded-2xl border border-emerald-400/20 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200">{{ success() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-200">Email</label>
          <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" placeholder="you@example.com" class="fm-input fm-auth-input fm-auth-narrow-input" required />
        </div>

        <button type="submit" [disabled]="loading()" class="fm-button-primary w-full rounded-full py-3.5 text-base disabled:cursor-not-allowed disabled:opacity-60">
          {{ loading() ? 'Sending OTP...' : 'Send OTP' }}
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-300">
        Remembered password?
        <a routerLink="/login" class="font-semibold text-indigo-300 transition hover:text-indigo-200 ">Back to Login</a>
      </p>
    </div>
  </div>
</section>
