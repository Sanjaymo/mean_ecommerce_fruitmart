<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FruitMart</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#0b1020">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- DEV FALLBACK: set the Google Client ID directly so login can initialize without fetching from backend -->
  <script>
    window.__FM_GOOGLE_CLIENT_ID = '713950981163-m3pnntlivcl0po4ltg6p19mudgrh9daj.apps.googleusercontent.com';
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="icon" type="image/png" href="/logo.png?v=3">
  <link rel="shortcut icon" type="image/png" href="/logo.png?v=3">
  <link rel="apple-touch-icon" href="/logo.png?v=3">
  <script>
    (function () {
      try {
        var path = (window.location.pathname || '/').replace(/\/+$/, '') || '/';
        if (path !== '/become-seller') return;

        var rawUser = window.sessionStorage.getItem('fm_user');
        if (!rawUser) return;

        var user = JSON.parse(rawUser);
        var isApprovedSeller =
          user && (user.role === 'seller' || (user.sellerProfile && user.sellerProfile.sellerStatus === 'approved'));

        if (isApprovedSeller) {
          var target = '/seller-dashboard' + (window.location.search || '') + (window.location.hash || '');
          window.location.replace(target);
        }
      } catch (e) {
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
