<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <style>
    .box { fill:#ffffff; stroke:#333; stroke-width:2; rx:8; }
    .label { font: 16px/1.2 Arial, Helvetica, sans-serif; fill:#111; }
    .sub { font: 12px/1.2 Arial, Helvetica, sans-serif; fill:#444; }
    .arrow { stroke:#333; stroke-width:2; fill:none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Front row -->
  <rect class="box" x="50" y="40" width="200" height="80" />
  <text class="label" x="150" y="70" text-anchor="middle">Browser / Mobile</text>
  <text class="sub" x="150" y="92" text-anchor="middle">(User UI)</text>

  <rect class="box" x="300" y="40" width="260" height="80" />
  <text class="label" x="430" y="70" text-anchor="middle">Frontend — Angular SPA</text>
  <text class="sub" x="430" y="92" text-anchor="middle">(Tailwind, components, pages)</text>

  <rect class="box" x="620" y="40" width="260" height="80" />
  <text class="label" x="750" y="70" text-anchor="middle">API — Node.js / Express</text>
  <text class="sub" x="750" y="92" text-anchor="middle">(routes, middleware, controllers)</text>

  <rect class="box" x="940" y="40" width="200" height="80" />
  <text class="label" x="1040" y="70" text-anchor="middle">CDN / Hosting</text>
  <text class="sub" x="1040" y="92" text-anchor="middle">(static assets)</text>

  <!-- Backend services -->
  <rect class="box" x="620" y="170" width="200" height="70" />
  <text class="label" x="720" y="200" text-anchor="middle">MongoDB</text>
  <text class="sub" x="720" y="218" text-anchor="middle">(documents & collections)</text>

  <rect class="box" x="870" y="170" width="200" height="70" />
  <text class="label" x="970" y="200" text-anchor="middle">Payment Provider</text>
  <text class="sub" x="970" y="218" text-anchor="middle">(Stripe / Razorpay / PSP)</text>

  <rect class="box" x="870" y="260" width="200" height="70" />
  <text class="label" x="970" y="290" text-anchor="middle">Email Service</text>
  <text class="sub" x="970" y="308" text-anchor="middle">(SMTP / SendGrid)</text>

  <rect class="box" x="620" y="260" width="200" height="70" />
  <text class="label" x="720" y="290" text-anchor="middle">Object Storage</text>
  <text class="sub" x="720" y="308" text-anchor="middle">(S3 / Blob for images)</text>

  <!-- Admin UI -->
  <rect class="box" x="50" y="170" width="200" height="80" />
  <text class="label" x="150" y="205" text-anchor="middle">Admin / Seller UI</text>
  <text class="sub" x="150" y="223" text-anchor="middle">(Admin dashboards)</text>

  <!-- Arrows -->
  <path class="arrow" d="M250 80 L300 80" />
  <path class="arrow" d="M560 80 L620 80" />
  <path class="arrow" d="M880 80 L940 80" />
  <path class="arrow" d="M200 200 L620 200" />
  <path class="arrow" d="M780 120 L780 170" />
  <path class="arrow" d="M820 240 L820 260" />
  <path class="arrow" d="M920 120 L920 170" />

  <!-- Labels -->
  <text class="sub" x="430" y="40" text-anchor="middle">HTTPS / REST</text>

  <!-- Footer legend -->
  <text class="sub" x="60" y="560">Generated diagram: Fruit-Mart component architecture</text>
</svg>
